- hosts: all
  become: true

  roles:
    - role: geerlingguy.pip
      tags: prepare
    - role: geerlingguy.docker
      tags: prepare

- hosts: webservers
  become: true

  roles:
    - role: datadog.datadog
      tags: datadog

  tasks:
    - name: Create Redmine app directory
      ansible.builtin.file:
        path: "{{ redmine_app_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      tags: deploy

    - name: Create Redmine env file
      ansible.builtin.template:
        src: redmine.env.j2
        dest: "{{ redmine_app_dir }}/.env"
        owner: root
        group: root
        mode: "0600"
      tags: deploy

    - name: Run Redmine container
      community.docker.docker_container:
        name: "{{ redmine_container_name }}"
        image: "{{ redmine_image }}"
        state: started
        restart_policy: always
        recreate: true
        env_file: "{{ redmine_app_dir }}/.env"
        published_ports:
          - "{{ redmine_port }}:{{ redmine_container_port }}"
      tags: deploy
